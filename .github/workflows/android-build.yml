name: Android build (AAB)

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Android versionCode (must increase each Play upload)"
        required: true
        default: "1"
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    env:
      # Public by design (shipped in the bundle) — safe to keep here.
      EXPO_PUBLIC_INSTANT_APP_ID: feb5e50f-21d7-4880-9de5-49eba48f2a45
    steps:
      - uses: actions/checkout@v4

      # Tag for naming: the pushed git tag (v1.0.0), else v<app.json version>.
      - name: Resolve tag
        id: ver
        working-directory: apps/mobile
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(node -p "require('./app.json').expo.version")"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag = $TAG"

      # No `version:` — it's read from package.json "packageManager" (pnpm@9.12.0).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # versionCode: from manual input, else derived from the tag's run number.
      - name: Set versionCode
        working-directory: apps/mobile
        run: |
          VC="${{ github.event.inputs.versionCode || github.run_number }}"
          node -e "const f='app.json';const j=require('./'+f);j.expo.android=j.expo.android||{};j.expo.android.versionCode=Number('$VC');require('fs').writeFileSync(f,JSON.stringify(j,null,2));console.log('versionCode =',$VC)"

      - name: Expo prebuild (android)
        working-directory: apps/mobile
        run: npx expo prebuild -p android --clean --no-install

      - name: Decode upload keystore
        working-directory: apps/mobile
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Strip whitespace, then re-add missing '=' padding (often lost on copy).
          B=$(printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]')
          PAD=$(( (4 - ${#B} % 4) % 4 ))
          for i in $(seq 1 $PAD); do B="${B}="; done
          printf '%s' "$B" | base64 -d > android/app/upload.keystore
          test -s android/app/upload.keystore || { echo "Keystore vide — vérifie ANDROID_KEYSTORE_BASE64"; exit 1; }

      - name: Configure signing
        working-directory: apps/mobile
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=upload.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          node scripts/inject-signing.js

      - name: Build release AAB + APK
        working-directory: apps/mobile/android
        run: ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon

      # Rename to cooperative-plus_<tag>.{aab,apk} so artifact + release assets are tagged.
      - name: Rename outputs
        working-directory: apps/mobile/android/app/build/outputs
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          cp bundle/release/app-release.aab "cooperative-plus_${TAG}.aab"
          cp apk/release/app-release.apk "cooperative-plus_${TAG}.apk"

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: cooperative-plus_${{ steps.ver.outputs.tag }}_aab
          path: apps/mobile/android/app/build/outputs/cooperative-plus_${{ steps.ver.outputs.tag }}.aab
          if-no-files-found: error

      - name: Upload APK (sideload / test)
        uses: actions/upload-artifact@v4
        with:
          name: cooperative-plus_${{ steps.ver.outputs.tag }}_apk
          path: apps/mobile/android/app/build/outputs/cooperative-plus_${{ steps.ver.outputs.tag }}.apk
          if-no-files-found: error

      # Attach APK + AAB to a GitHub Release (only on tag push).
      - name: Publish GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            apps/mobile/android/app/build/outputs/cooperative-plus_${{ steps.ver.outputs.tag }}.apk
            apps/mobile/android/app/build/outputs/cooperative-plus_${{ steps.ver.outputs.tag }}.aab

  # ── Deploy: upload the built AAB to the Play Store (internal track). ──
  # Runs after `build`; skipped automatically when the Play secret is absent.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      # Secrets can't be used in step `if:` directly — expose via env.
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Download AAB artifact
        if: ${{ env.PLAY_JSON != '' }}
        uses: actions/download-artifact@v4
        with:
          name: cooperative-plus_${{ needs.build.outputs.tag }}_aab
          path: dist

      - name: Upload to Play Store (internal)
        if: ${{ env.PLAY_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ts.mila.cooperativeplus
          releaseFiles: dist/cooperative-plus_${{ needs.build.outputs.tag }}.aab
          track: internal
          status: completed
