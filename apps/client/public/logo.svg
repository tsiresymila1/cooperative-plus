<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- background -->
  <rect width="1024" height="1024" fill="#000000"/>
  <rect x="40" y="40" width="944" height="944" rx="120" fill="#ffffff"/>

  <!-- green swoosh arrow -->
  <path d="M360 270 Q560 150 800 215 L760 175 M800 215 L760 255"
        fill="none" stroke="#6cb33f" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M380 305 Q560 205 770 255"
        fill="none" stroke="#6cb33f" stroke-width="22"
        stroke-linecap="round" opacity="0.85"/>

  <!-- bus shadow -->
  <ellipse cx="500" cy="585" rx="270" ry="20" fill="#1b2b66" opacity="0.25"/>

  <!-- minibus / Sprinter, 3/4 front-left view -->
  <g stroke="#1b2b66" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
    <!-- main tall boxy body -->
    <path d="M250 560
             L250 360
             Q250 332 280 330
             L600 330
             Q628 332 648 352
             L700 408
             Q716 426 718 452
             L720 540
             Q720 562 698 562
             L268 562
             Q250 562 250 560 Z"
          fill="#ffffff"/>

    <!-- roof drip rail -->
    <path d="M258 348 L598 348" stroke="#1b2b66" stroke-width="6" fill="none"/>

    <!-- orange waistline stripe -->
    <path d="M252 470 L716 466 L718 500 L254 504 Z" fill="#f47b20" stroke="none"/>

    <!-- windshield -->
    <path d="M604 348 Q636 360 660 392 L678 430 L606 432 Q594 432 594 414 L594 360 Q594 348 604 348 Z" fill="#dbe4f3"/>

    <!-- side window band (minibus = many windows) -->
    <path d="M278 360 L576 360 Q586 360 586 372 L586 430 L272 432 L272 372 Q272 360 278 360 Z" fill="#dbe4f3"/>
    <!-- window pillars -->
    <line x1="350" y1="360" x2="349" y2="431" stroke="#1b2b66" stroke-width="8"/>
    <line x1="425" y1="360" x2="424" y2="431" stroke="#1b2b66" stroke-width="8"/>
    <line x1="500" y1="360" x2="499" y2="431" stroke="#1b2b66" stroke-width="8"/>

    <!-- sliding-door seam + handle -->
    <line x1="425" y1="432" x2="424" y2="558" stroke="#1b2b66" stroke-width="7"/>
    <rect x="392" y="512" width="30" height="9" rx="4" fill="#1b2b66" stroke="none"/>

    <!-- front door seam -->
    <line x1="586" y1="432" x2="585" y2="558" stroke="#1b2b66" stroke-width="7"/>

    <!-- headlight + grille -->
    <path d="M678 452 L716 470 L718 506 L680 506 Z" fill="#f47b20" stroke="none"/>

    <!-- wheel arches + wheels -->
    <circle cx="358" cy="562" r="46" fill="#1b2b66" stroke="none"/>
    <circle cx="358" cy="562" r="21" fill="#ffffff" stroke="none"/>
    <circle cx="638" cy="562" r="46" fill="#1b2b66" stroke="none"/>
    <circle cx="638" cy="562" r="21" fill="#ffffff" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="512" y="700" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-style="italic" font-size="138" fill="#1b2b66"
        letter-spacing="-3">COOPERATIVE</text>

  <g>
    <text x="475" y="820" text-anchor="middle"
          font-family="Arial Black, Arial, sans-serif" font-weight="900"
          font-style="italic" font-size="130" fill="#f47b20"
          letter-spacing="-2">Plus</text>
    <!-- green plus -->
    <g fill="#6cb33f">
      <rect x="660" y="735" width="22" height="64" rx="4"/>
      <rect x="639" y="756" width="64" height="22" rx="4"/>
    </g>
  </g>

  <!-- navy underline -->
  <path d="M330 880 Q512 905 694 880" fill="none"
        stroke="#1b2b66" stroke-width="12" stroke-linecap="round"/>
</svg>
